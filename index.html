<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🌌 Universo Gracias</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
        html, body {
            width:100%; height:100%;
            background:#000;
            overflow:hidden;
            touch-action:none;
        }
        canvas {
            display:block;
            width:100%; height:100%;
            touch-action:none;
        }
        .instruccion {
            position:fixed;
            bottom:4vh;
            left:0; right:0;
            text-align:center;
            color:rgba(255,255,255,0.15);
            font-size:0.7rem;
            font-family: 'Segoe UI', Arial, sans-serif;
            pointer-events:none;
            z-index:10;
            letter-spacing:4px;
            text-transform:uppercase;
            font-weight:300;
            text-shadow:0 0 30px rgba(0,0,0,0.9);
        }
    </style>
</head>
<body>
    <div id="container"></div>
    <div class="instruccion">✦ ARRASTRÁ PARA EXPLORAR · ÓRBITA AUTOMÁTICA ✦</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        // ================================================================
        // 1. IMPORTS Y CONFIGURACIÓN
        // ================================================================
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // ================================================================
        // 2. ESCENA, CÁMARA Y RENDERER
        // ================================================================
        const container = document.getElementById('container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050008);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 12);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.5;
        container.appendChild(renderer.domElement);

        // ================================================================
        // 3. POSTPROCESADO (BLOOM / GLOW)
        // ================================================================
        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));

        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            0.8,   // intensidad
            0.4,   // radio
            0.1    // umbral
        );
        composer.addPass(bloomPass);

        // ================================================================
        // 4. CONTROLES (ÓRBITA AUTOMÁTICA)
        // ================================================================
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 2.0;
        controls.target.set(0, 0, 0);
        controls.maxPolarAngle = Math.PI / 2.2;
        controls.minPolarAngle = 0.2;
        controls.update();

        // ================================================================
        // 5. LUCES
        // ================================================================
        const ambient = new THREE.AmbientLight(0x222244);
        scene.add(ambient);

        const keyLight = new THREE.DirectionalLight(0xffeedd, 2);
        keyLight.position.set(5, 10, 7);
        scene.add(keyLight);

        const backLight = new THREE.DirectionalLight(0x4466ff, 1);
        backLight.position.set(-5, 0, -5);
        scene.add(backLight);

        // ================================================================
        // 6. TEXTO CON PARTÍCULAS (FUENTE MANUAL 7x9)
        // ================================================================
        const FONT = {
            'A': ['0111110','0111110','0111110','1000001','1111111','1000001','1000001','1000001','1000001'],
            'C': ['1111110','1111110','1000000','1000000','1000000','1000000','1000000','1111110','1111110'],
            'E': ['1111111','1111111','1000000','1000000','1111110','1000000','1000000','1111111','1111111'],
            'G': ['0111111','0111111','1000000','1000000','1001111','1000001','1000001','0111111','0111111'],
            'I': ['1111111','1111111','0010000','0010000','0010000','0010000','0010000','1111111','1111111'],
            'M': ['1000001','1100011','1100011','1010101','1010101','1001001','1001001','1000001','1000001'],
            'O': ['0111110','1111111','1000001','1000001','1000001','1000001','1000001','1111111','0111110'],
            'P': ['1111110','1111111','1000001','1000001','1111111','1111110','1000000','1000000','1000000'],
            'R': ['1111110','1111111','1000001','1000001','1111111','1111110','1001000','1001100','1000110'],
            'S': ['1111111','1111111','1000000','1000000','1111111','1111111','0000001','1111111','1111111'],
            'T': ['1111111','1111111','0010000','0010000','0010000','0010000','0010000','0010000','0010000'],
            'U': ['1000001','1000001','1000001','1000001','1000001','1000001','1000001','1111111','0111110'],
            'B': ['1111110','1111111','1000001','1000001','1111111','1111111','1000001','1111111','1111110'],
            'D': ['1111110','1111111','1000001','1000001','1000001','1000001','1000001','1111111','1111110'],
            'F': ['1111111','1111111','1000000','1000000','1111110','1111110','1000000','1111111','1111111'],
            'H': ['1000001','1000001','1000001','1000001','1111111','1111111','1000001','1000001','1000001'],
            'L': ['1000000','1000000','1000000','1000000','1000000','1000000','1000000','1111111','1111111'],
            'N': ['1000001','1100001','1110001','1111001','1001101','1000111','1000011','1000001','1000001'],
            'Y': ['1000001','1000001','1000001','0100010','0100010','0010100','0010100','0001000','0001000'],
            ' ': ['0000000','0000000','0000000','0000000','0000000','0000000','0000000','0000000','0000000'],
        };

        const LINEAS = [
            'GRACIAS POR',
            'SER MI AMIGO',
            'PUTA'
        ];

        const ROWS = 9;
        const SEP = 2;
        const SEP_LINEA = 4;

        function generarPuntos(lineas) {
            const pts = [];
            let yOffset = 0;
            for (let li = 0; li < lineas.length; li++) {
                const texto = lineas[li];
                let xOffset = 0;
                let anchoLinea = 0;
                for (let i = 0; i < texto.length; i++) {
                    const ch = texto[i];
                    const g = FONT[ch] || FONT[' '];
                    anchoLinea += g[0].length + (i < texto.length-1 ? SEP : 0);
                }
                const inicioX = -anchoLinea / 2;
                for (let i = 0; i < texto.length; i++) {
                    const ch = texto[i];
                    const g = FONT[ch] || FONT[' '];
                    const cols = g[0].length;
                    for (let r = 0; r < ROWS; r++) {
                        const fila = g[r];
                        for (let c = 0; c < cols; c++) {
                            if (fila[c] === '1') {
                                pts.push({
                                    x: inicioX + xOffset + c,
                                    y: yOffset + r,
                                    linea: li
                                });
                            }
                        }
                    }
                    xOffset += cols + SEP;
                }
                yOffset += ROWS + SEP_LINEA;
            }
            return pts;
        }

        const puntosRaw = generarPuntos(LINEAS);

        // Escala automática
        let scale = 1;
        function calcularEscala() {
            const anchoTexto = puntosRaw.reduce((max, p) => Math.max(max, Math.abs(p.x)), 0) * 2;
            const altoTexto = puntosRaw.reduce((max, p) => Math.max(max, Math.abs(p.y)), 0) * 2;
            const w = window.innerWidth;
            const h = window.innerHeight;
            const escalaX = (w * 0.7) / (anchoTexto || 1);
            const escalaY = (h * 0.7) / (altoTexto || 1);
            scale = Math.min(escalaX, escalaY, 2.0);
        }
        calcularEscala();

        // Crear las partículas del texto
        function crearTextoParticles() {
            const geometry = new THREE.BufferGeometry();
            const positions = [];
            const colors = [];

            const colorPuta = new THREE.Color('#ff0044');
            const palette = [
                new THREE.Color('#ff2a5a'),
                new THREE.Color('#ff8800'),
                new THREE.Color('#ff44ff'),
                new THREE.Color('#00ffcc'),
                new THREE.Color('#ffdd00'),
                new THREE.Color('#00aaff'),
            ];

            for (const p of puntosRaw) {
                const x = p.x * scale * 0.7;
                const y = p.y * scale * 0.7;
                const z = (Math.random() - 0.5) * 0.5;
                positions.push(x, y, z);

                let color;
                if (p.linea === 2) {
                    color = colorPuta;
                } else {
                    const base = palette[Math.floor(Math.random() * palette.length)];
                    color = base.clone().multiplyScalar(0.7 + Math.random() * 0.4);
                }
                colors.push(color.r, color.g, color.b);
            }

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 0.18,
                vertexColors: true,
                transparent: true,
                opacity: 0.95,
                blending: THREE.AdditiveBlending,
                sizeAttenuation: true,
                depthWrite: false,
            });

            return new THREE.Points(geometry, material);
        }

        const textParticles = crearTextoParticles();
        scene.add(textParticles);

        // ================================================================
        // 7. ESTRELLAS DE FONDO
        // ================================================================
        const starCount = 3000;
        const starGeo = new THREE.BufferGeometry();
        const starPos = new Float32Array(starCount * 3);
        const starSizes = new Float32Array(starCount);
        for (let i = 0; i < starCount; i++) {
            const r = 25 + Math.random() * 70;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            starPos[i*3] = r * Math.sin(phi) * Math.cos(theta);
            starPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
            starPos[i*3+2] = r * Math.cos(phi);
            starSizes[i] = 0.3 + Math.random() * 1.2;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        starGeo.setAttribute('size', new THREE.BufferAttribute(starSizes, 1));

        const starMat = new THREE.PointsMaterial({
            color: 0x88aaff,
            size: 0.15,
            transparent: true,
            opacity: 0.6,
            blending: THREE.AdditiveBlending,
            sizeAttenuation: true,
            depthWrite: false
        });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);

        // ================================================================
        // 8. ANILLO DE PARTÍCULAS ORBITANDO
        // ================================================================
        const ringCount = 600;
        const ringGeo = new THREE.BufferGeometry();
        const ringPos = new Float32Array(ringCount * 3);
        const ringColors = new Float32Array(ringCount * 3);
        for (let i = 0; i < ringCount; i++) {
            const radius = 3.5 + Math.random() * 1.5;
            const angle = Math.random() * Math.PI * 2;
            const y = (Math.random() - 0.5) * 5;
            ringPos[i*3] = Math.cos(angle) * radius;
            ringPos[i*3+1] = y;
            ringPos[i*3+2] = Math.sin(angle) * radius;
            const color = new THREE.Color().setHSL(0.6 + Math.random() * 0.3, 0.9, 0.5);
            ringColors[i*3] = color.r;
            ringColors[i*3+1] = color.g;
            ringColors[i*3+2] = color.b;
        }
        ringGeo.setAttribute('position', new THREE.BufferAttribute(ringPos, 3));
        ringGeo.setAttribute('color', new THREE.BufferAttribute(ringColors, 3));

        const ringMat = new THREE.PointsMaterial({
            size: 0.08,
            vertexColors: true,
            transparent: true,
            opacity: 0.5,
            blending: THREE.AdditiveBlending,
            sizeAttenuation: true,
            depthWrite: false
        });
        const ringParticles = new THREE.Points(ringGeo, ringMat);
        scene.add(ringParticles);

        // ================================================================
        // 9. ANIMACIÓN
        // ================================================================
        let clock = new THREE.Clock();

        function animate() {
            const delta = clock.getDelta();
            const elapsedTime = performance.now() / 1000;

            // Rotación de estrellas
            stars.rotation.y += 0.0001;
            stars.rotation.x += 0.00005;

            // Rotación del anillo
            ringParticles.rotation.y += 0.003;
            ringParticles.rotation.x = Math.sin(elapsedTime * 0.1) * 0.1;

            // Pulsar partículas del texto
            if (textParticles) {
                const pulse = 0.16 + 0.04 * Math.sin(elapsedTime * 1.5);
                textParticles.material.size = pulse;
            }

            controls.update();
            composer.render();
            requestAnimationFrame(animate);
        }
        animate();

        // ================================================================
        // 10. REDIMENSIONAR
        // ================================================================
        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
            composer.setSize(w, h);
        });

        // ================================================================
        // 11. LOG
        // ================================================================
        console.log('🌌 Universo Premium - Hecho con amor y código.');
    </script>
</body>
</html>
