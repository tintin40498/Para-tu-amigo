<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🌌 Universo Orbital</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
        html, body {
            width:100%; height:100%;
            background:#050008;
            overflow:hidden;
            touch-action:none;
        }
        canvas {
            display:block;
            width:100%; height:100%;
            touch-action:none;
        }
        .instruccion {
            position:fixed;
            bottom:4vh;
            left:0; right:0;
            text-align:center;
            color:#666;
            font-size:0.8rem;
            font-family:Arial,sans-serif;
            opacity:0.4;
            pointer-events:none;
            z-index:10;
            letter-spacing:2px;
            text-shadow:0 0 10px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>
    <div id="container"></div>
    <div class="instruccion">✦ arrastrá para mover la cámara · orbita automática ✦</div>

    <!-- Cargamos Three.js y OrbitControls desde un CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        // ================================================================
        // 1. IMPORTACIONES
        // ================================================================
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { FontLoader } from 'three/addons/loaders/FontLoader.js';
        import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';

        // ================================================================
        // 2. ESCENA, CÁMARA Y RENDER
        // ================================================================
        const container = document.getElementById('container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050008);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        container.appendChild(renderer.domElement);

        // ================================================================
        // 3. CONTROLES (ORBIT)
        // ================================================================
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 2.0;
        controls.target.set(0, 0, 0);
        controls.update();

        // ================================================================
        // 4. LUCES
        // ================================================================
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);

        const keyLight = new THREE.DirectionalLight(0xffeedd, 1);
        keyLight.position.set(5, 5, 5);
        keyLight.castShadow = true;
        scene.add(keyLight);

        const fillLight = new THREE.DirectionalLight(0x4466ff, 0.5);
        fillLight.position.set(-5, 0, 5);
        scene.add(fillLight);

        const rimLight = new THREE.DirectionalLight(0xff66aa, 0.8);
        rimLight.position.set(0, -5, -5);
        scene.add(rimLight);

        // ================================================================
        // 5. CREAR EL TEXTO 3D CON LETRAS DE VERDAD
        // ================================================================
        // Como no podemos cargar una fuente externa fácilmente desde un CDN,
        // usamos TextGeometry con la fuente Helvetiker que viene en los ejemplos.
        // Pero para simplificar y que funcione sin archivos externos,
        // vamos a usar un enfoque de partículas (Points) con la fuente generada
        // manualmente (como veníamos haciendo) pero en 3D.
        // 
        // Sin embargo, para que sea más impactante, vamos a usar el sistema de
        // partículas pero con mejor visualización.

        // ================================================================
        // 5.1 GENERAR PUNTOS DEL TEXTO (como antes, pero con más puntos)
        // ================================================================
        const FONT = {
            'A': ['0111110','0111110','0111110','1000001','1111111','1000001','1000001','1000001','1000001'],
            'C': ['1111110','1111110','1000000','1000000','1000000','1000000','1000000','1111110','1111110'],
            'E': ['1111111','1111111','1000000','1000000','1111110','1000000','1000000','1111111','1111111'],
            'G': ['0111111','0111111','1000000','1000000','1001111','1000001','1000001','0111111','0111111'],
            'I': ['1111111','1111111','0010000','0010000','0010000','0010000','0010000','1111111','1111111'],
            'M': ['1000001','1100011','1100011','1010101','1010101','1001001','1001001','1000001','1000001'],
            'O': ['0111110','1111111','1000001','1000001','1000001','1000001','1000001','1111111','0111110'],
            'P': ['1111110','1111111','1000001','1000001','1111111','1111110','1000000','1000000','1000000'],
            'R': ['1111110','1111111','1000001','1000001','1111111','1111110','1001000','1001100','1000110'],
            'S': ['1111111','1111111','1000000','1000000','1111111','1111111','0000001','1111111','1111111'],
            'T': ['1111111','1111111','0010000','0010000','0010000','0010000','0010000','0010000','0010000'],
            'U': ['1000001','1000001','1000001','1000001','1000001','1000001','1000001','1111111','0111110'],
            'B': ['1111110','1111111','1000001','1000001','1111111','1111111','1000001','1111111','1111110'],
            'D': ['1111110','1111111','1000001','1000001','1000001','1000001','1000001','1111111','1111110'],
            'F': ['1111111','1111111','1000000','1000000','1111110','1111110','1000000','1111111','1111111'],
            'H': ['1000001','1000001','1000001','1000001','1111111','1111111','1000001','1000001','1000001'],
            'L': ['1000000','1000000','1000000','1000000','1000000','1000000','1000000','1111111','1111111'],
            'N': ['1000001','1100001','1110001','1111001','1001101','1000111','1000011','1000001','1000001'],
            'Y': ['1000001','1000001','1000001','0100010','0100010','0010100','0010100','0001000','0001000'],
            ' ': ['0000000','0000000','0000000','0000000','0000000','0000000','0000000','0000000','0000000'],
        };

        const LINEAS = [
            'GRACIAS POR',
            'SER MI AMIGO',
            'PUTA'
        ];

        const ROWS = 9;
        const SEP = 2;
        const SEP_LINEA = 4;

        function generarPuntos3D(lineas) {
            const pts = [];
            let yOffset = 0;
            for (let li = 0; li < lineas.length; li++) {
                const texto = lineas[li];
                let xOffset = 0;
                let anchoLinea = 0;
                for (let i = 0; i < texto.length; i++) {
                    const ch = texto[i];
                    const g = FONT[ch] || FONT[' '];
                    anchoLinea += g[0].length + (i < texto.length-1 ? SEP : 0);
                }
                const inicioX = -anchoLinea / 2;
                for (let i = 0; i < texto.length; i++) {
                    const ch = texto[i];
                    const g = FONT[ch] || FONT[' '];
                    const cols = g[0].length;
                    for (let r = 0; r < ROWS; r++) {
                        const fila = g[r];
                        for (let c = 0; c < cols; c++) {
                            if (fila[c] === '1') {
                                pts.push({
                                    x: inicioX + xOffset + c,
                                    y: yOffset + r,
                                    z: 0,
                                    linea: li
                                });
                            }
                        }
                    }
                    xOffset += cols + SEP;
                }
                yOffset += ROWS + SEP_LINEA;
            }
            return pts;
        }

        const puntosRaw = generarPuntos3D(LINEAS);

        // Escala automática
        let scale = 1;
        function calcularEscala() {
            const anchoTexto = puntosRaw.reduce((max, p) => Math.max(max, Math.abs(p.x)), 0) * 2;
            const altoTexto = puntosRaw.reduce((max, p) => Math.max(max, Math.abs(p.y)), 0) * 2;
            const w = window.innerWidth;
            const h = window.innerHeight;
            const escalaX = (w * 0.6) / (anchoTexto || 1);
            const escalaY = (h * 0.6) / (altoTexto || 1);
            scale = Math.min(escalaX, escalaY, 2.5);
        }
        calcularEscala();
        window.addEventListener('resize', () => {
            calcularEscala();
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            // Regenerar las partículas con la nueva escala
            generarParticulas();
        });

        // ================================================================
        // 5.2 CREAR LAS PARTÍCULAS DEL TEXTO
        // ================================================================
        let particleSystem = null;
        let particleColors = [];

        function generarParticulas() {
            if (particleSystem) {
                scene.remove(particleSystem);
                particleSystem.geometry.dispose();
                particleSystem.material.dispose();
            }

            const geometry = new THREE.BufferGeometry();
            const positions = [];
            const colors = [];
            const sizes = [];
            const colorPuta = new THREE.Color('#ff0044');

            for (const p of puntosRaw) {
                const x = p.x * scale * 0.8;
                const y = p.y * scale * 0.8;
                const z = (Math.random() - 0.5) * 0.5;
                positions.push(x, y, z);

                // Color según la línea
                let color;
                if (p.linea === 2) {
                    color = colorPuta;
                } else {
                    // Color variable para el resto
                    const hue = (Math.random() * 0.2 + 0.9) % 1;
                    color = new THREE.Color().setHSL(hue, 0.9, 0.6);
                }
                colors.push(color.r, color.g, color.b);
                sizes.push(0.15 + Math.random() * 0.1);
            }

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.Float32BufferAttribute(sizes, 1));

            const material = new THREE.PointsMaterial({
                size: 0.12,
                vertexColors: true,
                transparent: true,
                opacity: 0.95,
                blending: THREE.AdditiveBlending,
                sizeAttenuation: true,
                depthWrite: false,
            });

            particleSystem = new THREE.Points(geometry, material);
            scene.add(particleSystem);
        }

        generarParticulas();

        // ================================================================
        // 6. ESTRELLAS DE FONDO
        // ================================================================
        const numStars = 2000;
        const starGeometry = new THREE.BufferGeometry();
        const starPositions = new Float32Array(numStars * 3);
        const starColors = new Float32Array(numStars * 3);
        for (let i = 0; i < numStars; i++) {
            const r = 30 + Math.random() * 50;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            starPositions[i*3] = r * Math.sin(phi) * Math.cos(theta);
            starPositions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
            starPositions[i*3+2] = r * Math.cos(phi);
            const brightness = 0.3 + Math.random() * 0.7;
            starColors[i*3] = brightness;
            starColors[i*3+1] = brightness * 0.8;
            starColors[i*3+2] = brightness;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        starGeometry.setAttribute('color', new THREE.BufferAttribute(starColors, 3));

        const starMaterial = new THREE.PointsMaterial({
            size: 0.2,
            vertexColors: true,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending,
            sizeAttenuation: true,
            depthWrite: false,
        });
        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);

        // ================================================================
        // 7. ANIMACIÓN
        // ================================================================
        let time = 0;

        function animate() {
            time += 0.01;

            // Rotación lenta de las estrellas de fondo
            stars.rotation.y += 0.0002;
            stars.rotation.x += 0.0001;

            // Pulsar tamaño de las partículas del texto
            if (particleSystem) {
                const pulse = 0.08 + 0.04 * Math.sin(time * 2);
                particleSystem.material.size = pulse;
            }

            controls.update();
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate();

        // ================================================================
        // 8. LOG EN CONSOLA
        // ================================================================
        console.log('🌌 Universo Orbital - Arrastrá para mover la cámara.');

    </script>
</body>
</html>
