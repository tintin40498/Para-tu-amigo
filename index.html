<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>✨ Universo Gracias</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
        html, body {
            width:100%; height:100%;
            background:#000;
            overflow:hidden;
            touch-action:none;
        }
        canvas {
            display:block;
            width:100%; height:100%;
            touch-action:none;
        }
        .instruccion {
            position:fixed;
            bottom:4vh;
            left:0; right:0;
            text-align:center;
            color:rgba(255,255,255,0.15);
            font-size:0.7rem;
            font-family: 'Segoe UI', Arial, sans-serif;
            pointer-events:none;
            z-index:10;
            letter-spacing:4px;
            text-transform:uppercase;
            font-weight:300;
            text-shadow:0 0 30px rgba(0,0,0,0.9);
        }
    </style>
</head>
<body>
    <div id="container"></div>
    <div class="instruccion">✦ ARRASTRÁ PARA EXPLORAR · ÓRBITA AUTOMÁTICA ✦</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        // ================================================================
        // 1. IMPORTS Y CONFIG
        // ================================================================
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // ================================================================
        // 2. ESCENA, CÁMARA, RENDER
        // ================================================================
        const container = document.getElementById('container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050008);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 12);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.5;
        container.appendChild(renderer.domElement);

        // ================================================================
        // 3. POSTPROCESADO (BLOOM / GLOW)
        // ================================================================
        const composer = new EffectComposer(renderer);
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);

        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            0.6,   // intensidad
            0.4,   // radio
            0.2    // umbral
        );
        composer.addPass(bloomPass);

        // ================================================================
        // 4. CONTROLES DE ÓRBITA
        // ================================================================
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1.8;
        controls.target.set(0, 0, 0);
        controls.maxPolarAngle = Math.PI / 2.2;
        controls.minPolarAngle = 0.2;
        controls.update();

        // ================================================================
        // 5. LUCES
        // ================================================================
        const ambientLight = new THREE.AmbientLight(0x222244);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffeedd, 2);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        const backLight = new THREE.DirectionalLight(0x4466ff, 1);
        backLight.position.set(-5, 0, -5);
        scene.add(backLight);

        // ================================================================
        // 6. TEXTO 3D (CON FUENTE REAL)
        // ================================================================
        // Cargamos la fuente Helvetiker que viene con Three.js
        const loader = new THREE.FontLoader();
        let textMesh = null;
        let textGroup = new THREE.Group();
        scene.add(textGroup);

        loader.load('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/fonts/helvetiker_regular.typeface.json', (font) => {
            const lines = ['GRACIAS POR', 'SER MI AMIGO', 'PUTA'];
            const colorPuta = new THREE.Color('#ff0044');
            const colors = [0xff2a5a, 0xff8800, 0xff44ff, 0x00ffcc, 0xffdd00, 0x00aaff];

            lines.forEach((text, index) => {
                const isPuta = (index === 2);
                const color = isPuta ? colorPuta : new THREE.Color(colors[index % colors.length]);

                const geometry = new THREE.TextGeometry(text, {
                    font: font,
                    size: 0.8,
                    height: 0.15,
                    curveSegments: 12,
                    bevelEnabled: true,
                    bevelThickness: 0.02,
                    bevelSize: 0.01,
                    bevelOffset: 0,
                    bevelSegments: 5
                });

                // Centrar cada línea
                geometry.computeBoundingBox();
                const box = geometry.boundingBox;
                const width = box.max.x - box.min.x;
                const offsetX = -width / 2;

                const material = new THREE.MeshStandardMaterial({
                    color: color,
                    emissive: color,
                    emissiveIntensity: isPuta ? 0.8 : 0.4,
                    roughness: 0.2,
                    metalness: 0.7,
                });

                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.set(offsetX, -index * 1.5 + 1.5, 0);
                textGroup.add(mesh);
            });
        });

        // ================================================================
        // 7. PARTÍCULAS DE FONDO (UNIVERSO)
        // ================================================================
        // 7.1 Estrellas lejanas (esfera)
        const starCount = 3000;
        const starGeo = new THREE.BufferGeometry();
        const starPos = new Float32Array(starCount * 3);
        const starSizes = new Float32Array(starCount);
        for (let i = 0; i < starCount; i++) {
            const r = 25 + Math.random() * 70;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            starPos[i*3] = r * Math.sin(phi) * Math.cos(theta);
            starPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
            starPos[i*3+2] = r * Math.cos(phi);
            starSizes[i] = 0.3 + Math.random() * 1.2;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        starGeo.setAttribute('size', new THREE.BufferAttribute(starSizes, 1));

        const starMat = new THREE.PointsMaterial({
            color: 0x88aaff,
            size: 0.2,
            transparent: true,
            opacity: 0.7,
            blending: THREE.AdditiveBlending,
            sizeAttenuation: true,
            depthWrite: false
        });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);

        // 7.2 Nube de partículas orbitando alrededor del texto
        const particleCount = 800;
        const particleGeo = new THREE.BufferGeometry();
        const particlePos = new Float32Array(particleCount * 3);
        const particleColors = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            const radius = 3 + Math.random() * 4;
            const angle = Math.random() * Math.PI * 2;
            const y = (Math.random() - 0.5) * 6;
            particlePos[i*3] = Math.cos(angle) * radius;
            particlePos[i*3+1] = y;
            particlePos[i*3+2] = Math.sin(angle) * radius;
            const color = new THREE.Color().setHSL(0.6 + Math.random() * 0.3, 0.8, 0.5);
            particleColors[i*3] = color.r;
            particleColors[i*3+1] = color.g;
            particleColors[i*3+2] = color.b;
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePos, 3));
        particleGeo.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));

        const particleMat = new THREE.PointsMaterial({
            size: 0.08,
            vertexColors: true,
            transparent: true,
            opacity: 0.6,
            blending: THREE.AdditiveBlending,
            sizeAttenuation: true,
            depthWrite: false
        });
        const particleSystem = new THREE.Points(particleGeo, particleMat);
        scene.add(particleSystem);

        // ================================================================
        // 8. ANIMACIÓN
        // ================================================================
        let clock = new THREE.Clock();

        function animate() {
            const delta = clock.getDelta();
            const elapsedTime = performance.now() / 1000;

            // Rotación de estrellas lejanas
            stars.rotation.y += 0.0001;
            stars.rotation.x += 0.00005;

            // Rotación de la nube de partículas
            particleSystem.rotation.y += 0.002;
            particleSystem.rotation.x = Math.sin(elapsedTime * 0.1) * 0.1;

            // El texto tiene un leve flotación
            if (textGroup) {
                textGroup.position.y = Math.sin(elapsedTime * 0.5) * 0.1;
                textGroup.rotation.z = Math.sin(elapsedTime * 0.3) * 0.02;
            }

            controls.update();
            composer.render();
            requestAnimationFrame(animate);
        }
        animate();

        // ================================================================
        // 9. REDIMENSIONAR
        // ================================================================
        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
            composer.setSize(w, h);
        });

        // ================================================================
        // 10. LOG
        // ================================================================
        console.log('✨ Universo Premium - Hecho con amor y código.');
    </script>
</body>
</html>
